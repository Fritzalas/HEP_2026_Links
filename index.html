<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HEP 2026 Link Portal</title>

    <style>

        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            min-height:100vh;

            background:
                    linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.5)),
                    url("HEP2026_background.svg") center/cover no-repeat;

            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:20px;

            color:#111;
        }

        /* Container */

        .container{
            width:100%;
            max-width:480px;

            padding:clamp(25px, 5vw, 45px);

            border-radius:18px;

            text-align:center;

            display:flex;
            flex-direction:column;
            justify-content:center;
            min-height:60vh; /* key for spacing */
        }

        /* Header */

        .profile h1{
            margin:0;
            font-size:clamp(22px, 5vw, 30px);
            font-weight:700;
            letter-spacing:1px;
        }

        .profile p{
            margin-top:10px;
            font-size:clamp(14px, 3.5vw, 15px);
            color:#555;
            line-height:1.5;
        }

        /* Links */

        .links{
            margin-top:30px;
            display:flex;
            flex-direction:column;
            gap:16px;
        }

        .link{
            display:block;
            text-decoration:none;

            padding:clamp(14px, 3.5vw, 16px);

            border-radius:12px;

            font-size:clamp(14px, 3.5vw, 15px);
            font-weight:500;

            color:#1a1a1a;

            background:#f6f8fb;
            border:1px solid #e1e6ee;

            transition:all 0.25s ease;
        }

        /* Hover (desktop) */

        .link:hover{
            transform:translateY(-3px);
            background:linear-gradient(135deg,#4c7dff,#6fa6ff);
            color:white;
            border-color:transparent;
            box-shadow:0 8px 20px rgba(76,125,255,0.35);
        }

        /* Active (mobile tap feedback) */

        .link:active{
            transform:scale(0.98);
        }

        /* Footer */

        footer{
            margin-top:30px;
            font-size:12px;
            color:#666;
        }

        /* Animation */

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(20px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        /* Small screens tweaks */

        @media (max-width: 480px) {
            html, body {
                height: 100%; /* make body fill full viewport height */
            }

            body {
                display: flex;
                justify-content: center; /* horizontal centering */
                align-items: center;     /* vertical centering */
                padding: 20px;
            }

            .container {
                margin-top: 0;   /* remove extra top margin */
                border-radius: 14px;
                width: 100%;
                max-width: 480px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <div class="links">

        <a class="link" href="https://physics.ntua.gr/~ntrac/HEP_2026/" target="_blank">
            HEP Website
        </a>

        <a class="link" href="https://indico.cern.ch/event/1654737/registrations/126569/" target="_blank">
            Registration
        </a>

        <a class="link" href="https://indico.cern.ch/event/1654737/page/41746-overview" target="_blank">
            Indico Link
        </a>

        <a class="link" href="https://eesfye.gr/" target="_blank">
            HESSHEP
        </a>

        <a class="link" href="https://ntua.gr/en/" target="_blank">
            NTUA
        </a>

    </div>

</div>

</body>
</html>
